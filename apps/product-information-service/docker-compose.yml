services:
  product-information-service:
    build:
      # Build context stays at the monorepo root so pnpm-workspace.yaml
      # and the root pnpm-lock.yaml are available during the Docker build.
      context: ../..
      dockerfile: apps/product-information-service/Dockerfile
    image: product-information-service:latest
    container_name: product-information-service
    ports:
      - "${PORT:-3003}:${PORT:-3003}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3003}

      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@host.docker.internal:${DB_PORT:-5432}/${DB_NAME:-product-information-service}
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-product-information-service}

      JWT_SECRET: ${JWT_SECRET:-some-super-secret-key}

      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_ORDER_SAGA_STATUS_QUEUE_URL: ${AWS_ORDER_SAGA_STATUS_QUEUE_URL:-}
      AWS_ORDER_TOPIC_ARN: ${AWS_ORDER_TOPIC_ARN:-}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped